<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>校园智能导览地图 - 杭州市政苑小学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1B5E20;--pl:#4CAF50;--bg:#EAF4EA;--card:#fff;--text:#1a1a1a;
  --sh:0 8px 32px rgba(0,0,0,.15);
  --header-h:72px;
  --sidebar-w:300px;
}
body{font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;min-height:100vh;
  font-size:15px;position:fixed;width:100%;height:100%;
}

/* ===== HEADER ===== */
.header{
  background:#B3E5FC;
  color:#0277BD;
  padding:0 24px;
  height:var(--header-h);
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 3px 16px rgba(0,0,0,.15);
}
.logo-svg{width:52px;height:52px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));}
.header-text{flex:1;min-width:0;}
.header-text h1{font-size:clamp(17px,3.5vw,24px);letter-spacing:2px;font-weight:700;
  color:#0277BD;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-text p{font-size:clamp(11px,2vw,14px);color:#0288D1;margin-top:3px;
  letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-badge{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:4px 14px;font-size:12px;letter-spacing:.5px;
  backdrop-filter:blur(6px);white-space:nowrap;flex-shrink:0;
}

/* ===== MUSIC ===== */
.music-ctrl{position:fixed;top:80px;right:14px;z-index:99;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.music-btn{
  width:46px;height:46px;border-radius:50%;border:2.5px solid rgba(255,255,255,.85);
  background:rgba(27,94,32,.9);color:#fff;cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(0,0,0,.3);transition:all .2s;backdrop-filter:blur(8px);
}
.music-btn:hover{transform:scale(1.12);background:rgba(56,142,60,.98);}
.music-btn.playing{animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.music-label{
  font-size:11px;color:#fff;background:rgba(0,0,0,.6);
  padding:3px 10px;border-radius:10px;max-width:150px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  backdrop-filter:blur(4px);opacity:0;transition:opacity .3s;
}
.music-ctrl:hover .music-label{opacity:1;}

/* ===== LAYOUT ===== */
.page-body{display:flex;min-height:calc(100vh - var(--header-h));height:calc(100vh - var(--header-h));overflow:hidden;}

/* ===== SIDEBAR (desktop left menu) ===== */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:#fff;border-right:1px solid #d0e8d0;
  overflow-y:auto;position:sticky;top:var(--header-h);
  height:calc(100vh - var(--header-h));
  box-shadow:2px 0 12px rgba(0,0,0,.07);
  z-index:50;
}
.sidebar::-webkit-scrollbar{width:5px;}
.sidebar::-webkit-scrollbar-thumb{background:#b2dfb2;border-radius:3px;}
.sidebar-title{
  background:linear-gradient(90deg,#1B5E20,#2E7D32);
  padding:16px 18px;font-size:16px;font-weight:800;color:#fff;
  display:flex;align-items:center;gap:8px;letter-spacing:1px;
  border-bottom:3px solid #A5D6A7;position:sticky;top:0;z-index:2;
  text-shadow:0 1px 3px rgba(0,0,0,.3);
}
.sidebar-title::before{content:"";width:4px;height:20px;background:#fff;border-radius:2px;flex-shrink:0;}
.loc-section{
  padding:12px 16px 6px;font-size:13px;font-weight:700;color:#1B5E20;
  display:flex;align-items:center;gap:6px;border-bottom:1px solid #E8F5E9;
  letter-spacing:.3px;
}
.loc-section::before{content:"";width:3px;height:16px;background:#4CAF50;border-radius:2px;}
.loc-list{padding:6px 12px 10px;display:flex;flex-direction:column;gap:6px;}
.loc-btn{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border:2px solid #e0e0e0;border-radius:12px;
  background:#fff;cursor:pointer;transition:all .22s;
  font-size:14px;color:#1a1a1a;font-family:inherit;text-align:left;
  font-weight:500;
}
.loc-btn:hover{border-color:#4CAF50;background:#f1f8e9;transform:translateX(3px);box-shadow:0 3px 12px rgba(0,0,0,.1);}
.loc-btn.active{border-color:#1B5E20;background:#E8F5E9;font-weight:700;color:#1B5E20;}
.loc-btn.sub{border-style:dashed;font-size:13px;padding:9px 12px;margin-left:10px;}
.loc-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.loc-tag{font-size:9px;padding:2px 7px;border-radius:8px;color:#fff;margin-left:auto;flex-shrink:0;font-weight:600;}

/* ===== MAP AREA ===== */
.map-area{flex:1;padding:16px;min-width:0;overflow:hidden;}
.map-card{background:var(--card);border-radius:18px;box-shadow:var(--sh);overflow:hidden;}
.map-title{
  background:linear-gradient(90deg,#E8F5E9,#C8E6C9);
  padding:12px 18px;font-size:15px;color:#1B5E20;font-weight:700;
  display:flex;align-items:center;gap:8px;letter-spacing:.3px;
  border-bottom:1px solid #A5D6A7;flex-shrink:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.map-title::before{content:"";display:inline-block;width:4px;height:18px;background:#1B5E20;border-radius:2px;}

/* ===== MAP SVG (zoomable) ===== */
.map-svg-wrap{
  position:relative;width:100%;height:700px;
  background:linear-gradient(180deg,#e8f5e9 0%,#f1f8e9 40%,#fff8e1 100%);
  overflow:hidden;touch-action:none;cursor:default;
  user-select:none;-webkit-user-select:none;
}
.map-svg-wrap svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  transform-origin:0 0;
  transition:none;
  display:block;
}

/* Zoom controls */
.zoom-ctrl{
  position:absolute;bottom:14px;right:14px;z-index:10;
  display:flex;
  flex-direction:column;gap:4px;
}
.zoom-btn{
  width:38px;height:38px;border-radius:10px;border:none;
  background:rgba(255,255,255,.92);color:#1B5E20;cursor:pointer;
  font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.18);transition:all .15s;
  backdrop-filter:blur(6px);line-height:1;
}
.zoom-btn:hover{background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.22);}
.zoom-reset{font-size:13px;font-weight:600;}

/* ===== BUILDINGS SVG ===== */
.building{cursor:pointer;transition:all .2s ease;}
.building:hover{filter:brightness(1.1) drop-shadow(0 0 6px rgba(255,255,255,.4));}
.building.active .bld-body{stroke:#F44336;stroke-width:3.5;stroke-dasharray:7 3;animation:bldPulse 1s ease infinite;}
@keyframes bldPulse{0%,100%{stroke-opacity:1}50%{stroke-opacity:.35}}
.bld-label{font-size:11px;fill:#fff;font-weight:700;pointer-events:none;text-anchor:middle;dominant-baseline:central;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.bld-emoji{pointer-events:none;text-anchor:middle;dominant-baseline:central;}

.route-path{fill:none;stroke:#E53935;stroke-width:3.5;stroke-dasharray:9 5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .3s;}
.route-path.active{opacity:1;animation:dash .8s linear infinite;}
@keyframes dash{to{stroke-dashoffset:-14}}
.route-dot{opacity:0;transition:opacity .3s;}
.route-dot.active{opacity:1;animation:dotPulse 1s ease infinite;}
@keyframes dotPulse{0%,100%{r:5}50%{r:10}}
.route-end-dot{opacity:0;transition:opacity .3s;}
.route-end-dot.active{opacity:1;animation:endDotPulse 1s ease infinite;}
@keyframes endDotPulse{0%,100%{r:5}50%{r:10}}
@keyframes bounceWithColor{
  0%,100%{transform:scale(1);background:#fff;color:#1B5E20;box-shadow:0 3px 12px rgba(0,0,0,.2);}
  50%{transform:scale(1.15);background:#FF9800;color:#fff;box-shadow:0 6px 20px rgba(255,152,0,.4);}
}

.tip-bar{display:none !important;}
.footer{text-align:center;padding:18px;font-size:13px;color:#555;font-weight:500;letter-spacing:.3px;}
.tree{fill:#4CAF50;opacity:.45;}
.road-main{fill:none;stroke:#C8C8C8;stroke-linecap:round;stroke-linejoin:round;opacity:.8;}
.road-line{fill:none;stroke:#fff;stroke-dasharray:6 4;stroke-linecap:round;stroke-linejoin:round;opacity:.35;}
.road-rainbow{fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.65;}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.55);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(5px);
  overflow:hidden;
}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{
  background:#fff;border-radius:22px;width:100%;max-width:460px;max-height:75vh;overflow-y:auto;
  transform:translateY(32px) scale(.94);transition:transform .3s;
  box-shadow:0 24px 70px rgba(0,0,0,.25);position:relative;
  margin:auto;
}
@media(max-width:768px){
  .modal-overlay{align-items:center;justify-content:center;padding:10px;}
  .modal{max-height:85vh;border-radius:18px;margin:0 auto;width:92%;max-width:100%;}
}
.modal-overlay.show .modal{transform:translateY(0) scale(1);}
.modal-header{padding:22px 22px 14px;display:flex;align-items:center;gap:14px;}
.modal-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
.modal-header-text h2{font-size:20px;font-weight:700;color:#1a1a1a;}
.modal-header-text p{font-size:13px;color:#666;margin-top:3px;}
.modal-close{
  position:absolute;top:16px;right:16px;width:34px;height:34px;border:none;
  background:#f0f0f0;border-radius:50%;cursor:pointer;font-size:20px;color:#777;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.modal-close:hover{background:#e0e0e0;color:#222;}
.modal-body{padding:0 22px 22px;}
.m-sec{margin-bottom:16px;}
.m-sec h3{font-size:14px;color:#1B5E20;margin-bottom:8px;display:flex;align-items:center;gap:7px;font-weight:700;}
.m-sec h3::before{content:"";display:inline-block;width:3.5px;height:14px;background:#4CAF50;border-radius:2px;}
.m-sec p{font-size:14px;color:#333;line-height:1.8;}
.m-route{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);border:1.5px solid #FFD54F;border-radius:14px;padding:16px;margin-top:10px;}
.m-route h3{color:#E65100;margin-bottom:10px;}
.m-route h3::before{background:#FF9800;}
.m-route p{color:#5D4037;font-size:14px;line-height:1.8;}
.m-parent{background:#E8F5E9;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#2E7D32;display:flex;align-items:center;gap:7px;font-weight:600;}
.route-btn{
  display:inline-flex;align-items:center;gap:7px;margin-top:12px;
  padding:10px 20px;background:linear-gradient(135deg,#FF9800,#F57C00);
  color:#fff;border:none;border-radius:22px;cursor:pointer;font-size:14px;
  font-family:inherit;font-weight:600;transition:all .2s;
  box-shadow:0 3px 10px rgba(255,152,0,.35);
}
.route-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(255,152,0,.45);}

/* ===== MOBILE BOTTOM BAR ===== */
.mobile-loc{display:none !important;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .page-body{flex-direction:column;}
  .map-area{padding:10px;display:flex;flex-direction:column;}
  .map-card{flex:1;display:flex;flex-direction:column;}
  .mobile-loc{
    display:block;background:#fff;border-top:2px solid #A5D6A7;
    padding:10px 10px 14px;max-height:200px;overflow-y:auto;
  }
  .mobile-loc .loc-list{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:6px;padding:4px 0;
  }
  .mobile-loc .loc-btn{flex-direction:row;padding:8px 10px;font-size:13px;}
  .music-ctrl{top:66px;right:10px;}
  .music-btn{width:40px;height:40px;font-size:17px;}
}
@media(min-width:769px) and (max-width:1024px){
  :root{--sidebar-w:240px;}
  .loc-btn{font-size:13px;padding:9px 12px;}
}

/* ===== MOBILE DRAWER ===== */
.drawer-fab{
  display:none !important;
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:120;
  background:linear-gradient(135deg,#1B5E20,#388E3C);color:#fff;
  border:none;border-radius:28px;padding:12px 24px;font-size:14px;font-weight:700;
  box-shadow:0 4px 18px rgba(0,0,0,.28);cursor:pointer;font-family:inherit;
  align-items:center;gap:8px;letter-spacing:.5px;
  transition:all .2s;
}
.drawer-overlay{display:none !important;}
.drawer-panel{display:none !important;}
.drawer-overlay{
  display:none;position:fixed;bottom:0;left:0;right:0;top:0;
  background:rgba(0,0,0,.5);z-index:110;opacity:0;
  pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);
}
.drawer-overlay.show{opacity:1;pointer-events:auto;}
.drawer-panel{
  display:flex;flex-direction:column;position:fixed;bottom:0;left:0;right:0;
  max-height:70vh;background:#fff;border-radius:18px 18px 0 0;
  z-index:115;transform:translateY(100%);transition:transform .3s;
  box-shadow:0 -4px 20px rgba(0,0,0,.2);
}
.drawer-panel.show{transform:translateY(0);}
.drawer-header{
  padding:16px;border-bottom:1px solid #e0e0e0;
  display:flex;align-items:center;justify-content:space-between;
}
.drawer-header h2{font-size:16px;color:#1a1a1a;margin:0;}
.drawer-close{
  width:32px;height:32px;border:none;background:#f0f0f0;border-radius:8px;
  cursor:pointer;color:#666;font-size:20px;display:flex;align-items:center;justify-content:center;
}
.drawer-content{
  overflow-y:auto;flex:1;padding:12px 12px;
}
.drawer-loc-btn{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;margin-bottom:8px;border:2px solid #e0e0e0;border-radius:12px;
  background:#fff;cursor:pointer;transition:all .22s;
  font-size:14px;color:#1a1a1a;font-family:inherit;text-align:left;
  font-weight:500;border-radius:12px;
  width:100%;box-sizing:border-box;
}
.drawer-loc-btn:hover{border-color:#4CAF50;background:#f1f8e9;transform:translateX(3px);box-shadow:0 3px 12px rgba(0,0,0,.1);}
.drawer-loc-btn.active{border-color:#1B5E20;background:#E8F5E9;font-weight:700;color:#1B5E20;}


.sidebar-overlay{
  display:none;position:fixed;top:var(--header-h);left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);z-index:44;opacity:0;
  pointer-events:none;transition:opacity .3s;backdrop-filter:blur(3px);
}
.sidebar.show{transform:translateX(0) !important;}
.sidebar-toggle{
  display:none;position:fixed;left:14px;top:calc(var(--header-h) + 10px);z-index:46;
  width:40px;height:40px;border-radius:8px;border:none;
  background:#fff;color:#1B5E20;cursor:pointer;font-size:20px;
  box-shadow:0 3px 12px rgba(0,0,0,.2);align-items:center;justify-content:center;
}
@media(max-width:768px){
  .sidebar-toggle{display:flex;animation:bounceWithColor 2s ease-in-out infinite 3s;}
  .sidebar{position:fixed;left:0;top:var(--header-h);bottom:0;z-index:45;width:300px;
    transform:translateX(-100%);transition:transform .3s ease;display:flex !important;}
  .sidebar-overlay.show{opacity:1;pointer-events:auto;display:block;}
}
@media(max-width:768px){
  .drawer-fab{display:none !important;}
  .drawer-overlay.show{display:none !important;}
  .drawer-panel.show{display:none !important;}
}

</style>
</head>

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

// 升级版播放：主旋律(正弦波) + 和声(三角波，更柔和)
function playNote(freq,dur,vol,wave){
  if(!audioCtx||!freq)return;
  vol=vol||0.13;wave=wave||'sine';
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=wave;o.frequency.value=freq;
  g.gain.setValueAtTime(0,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur*0.88);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function playMelody(key){
  stopMelody();
  var m=MELODIES[key]||MELODIES._default;
  document.getElementById('musicLabel').textContent=m.name;
  curMelody=key;
  var dur=60/m.tempo,i=0;
  function next(){
    if(!isPlaying)return;
    if(i>=m.notes.length)i=0;
    var n=m.notes[i];
    var h=m.harmony?m.harmony[i%m.harmony.length]:null;
    if(n!=='-'&&noteFreq[n])playNote(noteFreq[n],dur*.9,0.13,'sine');
    if(h&&h!=='-'&&noteFreq[h])playNote(noteFreq[h],dur*0.85,m.hVol||0.06,'triangle');
    i++;melodyTimer=setTimeout(next,dur*1000);
  }
  next();
}
function stopMelody(){if(melodyTimer){clearTimeout(melodyTimer);melodyTimer=null;}}
function toggleMusic(){
  initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  isPlaying=!isPlaying;
  var btn=document.getElementById('musicBtn');
  if(isPlaying){btn.classList.add('playing');playMelody(curMelody||'_default');}
  else{btn.classList.remove('playing');stopMelody();}
}
function switchMusic(key){
  curMelody=key;
  if(isPlaying){stopMelody();playMelody(key);}
  else{document.getElementById('musicLabel').textContent=(MELODIES[key]||MELODIES._default).name;}
}

  container.innerHTML='';
  var list=document.createElement('div');list.className='loc-list';
  mainIds.forEach(function(id){
    var l=locs[id];
    var btn=document.createElement('button');btn.className='loc-btn';btn.dataset.id=id;
    var tag=l.isMain?'<span class="loc-tag" style="background:#FF9800">主</span>':'';
    btn.innerHTML='<span class="loc-icon" style="background:'+l.color+'18;color:'+l.color+'">'+l.emoji+'</span><span>'+l.name+'</span>'+tag;
    btn.onclick=function(){openLoc(id);};

      sb.onclick=function(){openLoc(sid);};
      list.appendChild(sb);
    });}

  container.appendChild(list);
}

var routeTimer=null;
function showRoute(){
  closeModal();
  var l=locs[curLoc];if(!l||!l.routePath)return;
  clearRoute();
  var rg=document.getElementById('routeGroup');
  var p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',l.routePath);
  p.setAttribute('class','route-path');
  // 移除箭头标记，改用圆点终点
  rg.appendChild(p);
  var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx','246');c.setAttribute('cy','243');c.setAttribute('r','5.5');
  c.setAttribute('class','route-dot');c.setAttribute('fill','#4CAF50');
  rg.appendChild(c);
  
  // 提取路径终点坐标（通过解析 routePath 的最后一个坐标）
  // 格式通常为 "M x1,y1 L x2,y2..." 或类似的 SVG path 格式
  var pathData = l.routePath;
  var coords = pathData.match(/[\d.]+/g);
  if(coords && coords.length >= 4) {
    var endX = coords[coords.length - 2];
    var endY = coords[coords.length - 1];
    var endDot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    endDot.setAttribute('cx', endX);
    endDot.setAttribute('cy', endY);
    endDot.setAttribute('r', '5.5');
    endDot.setAttribute('class', 'route-end-dot');
    endDot.setAttribute('fill', '#4CAF50');
    rg.appendChild(endDot);
  }
  
  requestAnimationFrame(function(){p.classList.add('active');c.classList.add('active');
    document.querySelectorAll('.route-end-dot').forEach(function(dot){dot.classList.add('active');});
  });
  // Smooth scroll to map on mobile
  document.getElementById('mapWrap').scrollIntoView({behavior:'smooth',block:'center'});
  // 15 seconds auto-clear
  if(routeTimer)clearTimeout(routeTimer);
  routeTimer=setTimeout(function(){clearRoute();},15000);
}
function clearRoute(){
  if(routeTimer){clearTimeout(routeTimer);routeTimer=null;}
  var rg=document.getElementById('routeGroup');
  while(rg.firstChild)rg.removeChild(rg.firstChild);
}

// ===== MAP ZOOM & PAN =====
var mapScale=1, mapX=0, mapY=0;
var isDragging=false, dragStartX=0, dragStartY=0, dragStartMapX=0, dragStartMapY=0;
// Touch
var lastDist=0, lastTouchX=0, lastTouchY=0, isPinching=false, touchStartX=0, touchStartY=0;

var svgEl=document.getElementById('campusMap');
var wrapEl=document.getElementById('mapWrap');

// 缩放限制：最小=1（原始大小），最大=3
var MIN_SCALE=1, MAX_SCALE=3;

// 计算平移边界并约束 mapX/mapY
// 规则：地图放大后，不允许露出超过容器边界的空白
function constrainPan(){
  if(!wrapEl) return;
  var rect=wrapEl.getBoundingClientRect();
  var W=rect.width, H=rect.height;
  // 放大后SVG尺寸
  var scaledW=W*mapScale, scaledH=H*mapScale;
  // 最大可平移量（单向）
  var maxX=(scaledW-W)/2;
  var maxY=(scaledH-H)/2;
  if(mapX>maxX) mapX=maxX;
  if(mapX<-maxX) mapX=-maxX;
  if(mapY>maxY) mapY=maxY;
  if(mapY<-maxY) mapY=-maxY;
}

function applyTransform(){
  var svg=document.getElementById('campusMap');
  if(!svg) return;
  // scale=1时不允许平移
  if(mapScale<=1){ mapX=0; mapY=0; }
  else { constrainPan(); }
  svg.style.transform='translate('+mapX+'px,'+mapY+'px) scale('+mapScale+')';
  svg.style.transformOrigin='center center';
  // 放大时显示可拖动光标
  if(wrapEl) wrapEl.style.cursor=(mapScale>1)?'grab':'default';
}

function constrainScale(){
  if(mapScale<MIN_SCALE) mapScale=MIN_SCALE;
  if(mapScale>MAX_SCALE) mapScale=MAX_SCALE;
}

function zoomIn(){
  mapScale*=1.25;
  constrainScale();
  applyTransform();
}

function zoomOut(){
  mapScale*=0.8;
  constrainScale();
  // 缩小时重新限制平移范围
  applyTransform();
}

function zoomReset(){
  mapScale=1;
  mapX=0;
  mapY=0;
  applyTransform();
}

function zoomAt(cx,cy,delta){
  // 保留接口
}

// ===== 鼠标拖拽平移（放大状态才生效）=====
wrapEl.addEventListener('mousedown',function(e){
  if(mapScale<=1) return;
  if(e.button===0){
    isDragging=true;
    dragStartX=e.clientX; dragStartY=e.clientY;
    dragStartMapX=mapX; dragStartMapY=mapY;
    wrapEl.style.cursor='grabbing';
    e.preventDefault();
  }
});
document.addEventListener('mousemove',function(e){
  if(!isDragging) return;
  mapX=dragStartMapX+(e.clientX-dragStartX);
  mapY=dragStartMapY+(e.clientY-dragStartY);
  applyTransform();
});
document.addEventListener('mouseup',function(){
  if(isDragging){
    isDragging=false;
    wrapEl.style.cursor=(mapScale>1)?'grab':'default';
  }
});

function getTouchDist(t1,t2){
  var dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY;
  return Math.sqrt(dx*dx+dy*dy);
}
wrapEl.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    isPinching=true;
    isDragging=false;
  } else if(e.touches.length===1){
    isPinching=false;
    if(mapScale>1){
      // 放大状态：记录起点，准备拖拽
      isDragging=true;
      touchStartX=e.touches[0].clientX;
      touchStartY=e.touches[0].clientY;
      dragStartMapX=mapX;
      dragStartMapY=mapY;
    } else {
      isDragging=false;
    }
  }
},{passive:false});

wrapEl.addEventListener('touchmove',function(e){
  if(e.touches.length===1 && isDragging && mapScale>1){
    var dx=e.touches[0].clientX-touchStartX;
    var dy=e.touches[0].clientY-touchStartY;
    mapX=dragStartMapX+dx;
    mapY=dragStartMapY+dy;
    applyTransform();
    e.preventDefault(); // 阻止页面滚动
  }
},{passive:false});

wrapEl.addEventListener('touchend',function(e){
  if(e.touches.length<2){ isPinching=false; }
  if(e.touches.length===0){ isDragging=false; }
});

function showQRCode(){
  var url=window.location.href;
  document.getElementById('qrcode').innerHTML='';
  // 简单的二维码生成：使用在线API或内置库
  // 方式1：使用 QR Server API（无需引入库）
  var qrCodeUrl='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(url);
  var img=document.createElement('img');
  img.src=qrCodeUrl;
  img.style.border='2px solid #1B5E20';
  img.style.borderRadius='8px';
  document.getElementById('qrcode').appendChild(img);
  document.getElementById('qrModalOv').classList.add('show');
}
function closeQRModal(){

}
function downloadQR(){
  var canvas=document.querySelector('#qrcode img');
  if(!canvas)return;
  var link=document.createElement('a');
  link.href=canvas.src;
  link.download='校园导览地图.png';
  link.click();
}
